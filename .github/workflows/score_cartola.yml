name: Copa — Sync · Resolver Palpites · Cartola

on:
  schedule:
    # Copa do Mundo 2026: 11 Jun – 19 Jul
    # Sede nos EUA/Canadá/México — jogos entre 12h00-21h00 EDT = 16h00-01h00 UTC
    #
    # Durante janela de jogos (15h-02h UTC): a cada 10 min
    - cron: '*/10 15-23 11-30 6 *'   # Junho: tarde/noite (horário dos jogos)
    - cron: '*/10 0-2   11-30 6 *'   # Junho: madrugada (fim dos jogos noturnos)
    - cron: '*/10 15-23 1-19  7 *'   # Julho: tarde/noite
    - cron: '*/10 0-2   1-19  7 *'   # Julho: madrugada
    # Fora da janela de jogos: a cada hora
    - cron: '0 3-14 11-30 6 *'       # Junho: manhã/tarde
    - cron: '0 3-14 1-19  7 *'       # Julho: manhã/tarde
  workflow_dispatch:                  # Roda manualmente pelo GitHub UI

# Garante que apenas um job roda por vez — evita conflitos de escrita no banco
concurrency:
  group: copa-sync
  cancel-in-progress: false   # espera o atual terminar, não cancela

jobs:
  atualizar:
    name: Sync · Resolver Palpites · Pontuar Cartola
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: 1 · Sincronizar jogos e placares
        env:
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_FOOTBALL_DATA_KEY:    ${{ secrets.VITE_FOOTBALL_DATA_KEY }}
        run: node sync.js

      - name: 2 · Sincronizar escalações (ESPN, sem auth)
        env:
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node sync_lineups.js

      - name: 3 · Resolver palpites das partidas encerradas
        env:
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_FOOTBALL_DATA_KEY:    ${{ secrets.VITE_FOOTBALL_DATA_KEY }}
        run: node resolve_bets.js

      - name: 4 · Pontuar Cartola e ajustar preços
        env:
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_FOOTBALL_DATA_KEY:    ${{ secrets.VITE_FOOTBALL_DATA_KEY }}
        run: node score_cartola.js
