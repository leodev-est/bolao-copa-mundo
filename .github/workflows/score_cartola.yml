name: Cartola — Calcular pontuações

on:
  schedule:
    # Roda a cada hora entre 12h e 00h UTC (cobre todos os jogos da Copa)
    # Copa: 11 Jun – 19 Jul 2026
    - cron: '0 12-23 11-30 6 *'   # Junho: dia 11–30
    - cron: '0 12-23 1-19  7 *'   # Julho: dia 1–19
  workflow_dispatch:               # Permite rodar manualmente pelo GitHub UI

jobs:
  score:
    name: Pontuar partidas encerradas
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Rodar script de pontuação
        env:
          VITE_SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_FOOTBALL_DATA_KEY:    ${{ secrets.VITE_FOOTBALL_DATA_KEY }}
        run: node score_cartola.js
